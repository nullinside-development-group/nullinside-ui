<div class="feedback-wrapper">
  @for (feedback of feedbackSubmitted(); track feedback.id) {
    <div class="feedback-card"
         (click)="onFeedbackClicked(feedback.id)"
         (keydown.enter)="onFeedbackClicked(feedback.id)"
         (keydown.space)="onFeedbackClicked(feedback.id)"
         tabindex="0"
         role="button">
      <div class="feedback-header">
        <span>{{ feedback.product }}</span>
        <p>{{ feedback.timestamp | timestamp }}</p>
      </div>
      <div class="feedback-message" [title]="feedback.message">
        {{ feedback.message }}
      </div>
      <div class="feedback-comments">
        {{ `Comments: ${feedback.comments.length}` }}
      </div>
    </div>
  } @empty {
    <p class="no-feedback">No feedback submitted yet.</p>
  }
</div>
