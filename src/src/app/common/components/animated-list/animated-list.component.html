<div class="list-container">
  <div class="list-title">{{ listTitle() }}</div>
  <div class="list">
    @for (item of list(); track item) {
      <div animate.enter="enter"
           animate.leave="leave"
           class="item"
           [matTooltip]="item.tooltip"
           matTooltipPosition="left">
        {{ item.text }}
      </div>
    }
  </div>
</div>
