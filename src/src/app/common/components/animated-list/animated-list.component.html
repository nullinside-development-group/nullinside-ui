<div class="name-list-container">
  <div class="name-list-title">{{ title() }}</div>
  <div class="name-list">
    @for (name of list(); track name) {
      <div animate.enter="name-enter"
           animate.leave="name-leave"
           class="name-item"
           [matTooltip]="name"
           matTooltipPosition="left">
        {{ name }}
      </div>
    }
  </div>
</div>
