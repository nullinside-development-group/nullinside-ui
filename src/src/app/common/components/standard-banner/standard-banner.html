<div class="layout-logo-box">
  <app-logo/>

  <div class="menu-bar">
    @for (app of appService.apps(); track app.displayName) {
      <button matButton="outlined" (click)="onAppClicked(app)">{{ app.displayName }}</button>
    }
  </div>

  <div class="right-section">
    <button matButton="outlined" (click)="onContactUs()">Contact Us</button>
    @if (auth.userIsLoggedIn()) {
      <button matButton="outlined" (click)="onLogout()">Logout</button>
    } @else {
      <button matButton="tonal" (click)="onLogin()">Login</button>
    }
  </div>
</div>
