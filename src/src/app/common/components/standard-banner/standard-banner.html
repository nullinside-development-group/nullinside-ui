<div class="layout-logo-box">
  <app-logo/>
  <div class="buttons">
    <button matButton="outlined" color="primary" (click)="onContactUs()">Contact Us</button>
  </div>
  @if (auth.userIsLoggedIn()) {
    <div class="buttons">
      <button matButton="outlined" (click)="onLogout()">Logout</button>
    </div>
  } @else {
    <div class="buttons">
      <button matButton="tonal" (click)="onLogin()">Login</button>
    </div>
  }
</div>
