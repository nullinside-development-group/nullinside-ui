<div class="carousel-wrapper">
  @if (currentIndex() > 0) {
    <button class="nav-button prev" (click)="scrollLeft()" aria-label="Previous streams">
      <span class="arrow-left"></span>
    </button>
  }
  <div class="carousel-container" #container>
    <div class="carousel-track" [style.transform]="'translateX(' + (currentIndex() * -(streamWidth() + gap())) + 'px)'">
      @for (stream of visibleStreams(); track stream.twitchId) {
        <div class="stream-box" [style.width.px]="streamWidth()"
             (click)="onStreamClicked(stream)"
             (auxclick)="onStreamClicked(stream)"
             (keydown)="onStreamClicked(stream)"
             tabindex="0">
          <div class="preview-container" [style.height.px]="streamHeight()" [style.width.px]="streamWidth()">
            <div class="live">LIVE</div>
            <div class="uptime">{{ stream.goneLiveTime | timespanDiff }}</div>
            <img
              [ngSrc]="stream.thumbnailUrl.replace('{width}', `${streamWidth()}`).replace('{height}', `${streamHeight()}`)"
              [alt]="stream.username + ' preview'"
              [width]="streamWidth()"
              [height]="streamHeight()"
              priority>
            <div class="view-count">{{ stream.viewerCount }} viewers</div>
          </div>
          <div class="stream-info">
            <span class="title" [title]="stream.streamTitle">{{ stream.streamTitle }}</span>
            <span>{{ stream.username }}</span>
            <span>{{ stream.gameName }}</span>
          </div>
        </div>
      }
    </div>
  </div>
  @if (currentIndex() < maxIndex()) {
    <button class="nav-button next" (click)="scrollRight()" aria-label="Next streams">
      <span class="arrow-right"></span>
    </button>
  }
</div>
